<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenagem Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fff0f3; font-family: 'Poppins', sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Efeito de Flores Caindo */
        .flower { position: fixed; top: -10%; font-size: 20px; animation: fall linear infinite; z-index: 999; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .container { flex: 1; max-width: 800px; margin: 50px auto; padding: 40px; text-align: center; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-family: 'Dancing Script', cursive; color: #c9184a; }
        
        #celebration-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ff9aa2; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; z-index: 1000; }
        button { padding: 15px 30px; background: #c9184a; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1.2rem; margin-top: 20px; }
        
        footer { background-color: #fff; padding: 20px; text-align: center; border-top: 3px solid #d4af37; font-size: 0.9rem; margin-top: auto; }
        footer a { color: #c9184a; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="main-content" class="container">
        <h1>Homenagem à Mulher Especial</h1>
        <p>Preencha o nome abaixo para iniciar a homenagem:</p>
        <input type="text" id="userName" placeholder="Nome da homenageada..." style="padding: 10px; width: 60%; margin-top: 20px;">
        <br><button onclick="iniciar()">Felicitar</button>
    </div>

    <div id="celebration-screen">
        <h2 id="final-message" style="font-family: 'Dancing Script', cursive; font-size: 2.5rem; line-height: 1.5;"></h2>
        <button onclick="location.reload()">Reiniciar</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <footer>
        Desenvolvido por <strong>Teotonio Baltazar</strong><br>
        <a href="mailto:tbaltaza@student42luanda.com">tbaltaza@student42luanda.com</a>
    </footer>

    <script>
        const frases = [
            "A força de uma mulher não está no que ela mostra, mas no que ela supera em silêncio.",
            "Mulher é poesia em forma de coragem, beleza moldada pela vida.",
            "O brilho do seu olhar inspira, a sua força ensina.",
            "Você é a prova viva de que a força e a delicadeza caminham juntas.",
            "Mulher: sua existência é um presente, seu espírito é revolução.",
            "Que o mundo reconheça todos os dias o valor que você tem, e não apenas hoje.",
            "Você não é apenas incrível: é essencial, única e insubstituível."
        ];

        function criarFlores() {
            for(let i=0; i<25; i++) {
                const f = document.createElement('div');
                f.innerHTML = '🌸';
                f.className = 'flower';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.animationDuration = Math.random() * 3 + 3 + 's';
                document.body.appendChild(f);
            }
        }

        function iniciar() {
            const name = document.getElementById('userName').value;
            if(!name.trim()) return alert("Por favor, digite um nome!");
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('celebration-screen').style.display = 'flex';
            document.getElementById('bg-music').play();
            
            const msg = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById('final-message').innerHTML = `Parabéns, ${name}!<br><br>"${msg}"`;
            criarFlores();
        }
    </script>
</body>
</html>
