 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia da Mulher Angolana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --gold: #d4af37;
            --dark-pink: #c9184a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--soft-pink);
            background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--dark-pink); font-size: 3rem; margin-bottom: 20px; }

        input[type="text"] { padding: 12px 20px; width: 70%; border: 2px solid var(--primary-pink); border-radius: 25px; outline: none; }

        button { padding: 12px 25px; background-color: var(--primary-pink); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; margin-left: 10px; }

        /* Estilo da tela de celebração */
        #celebration-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9aa2, #ffb7b2);
            z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }

        .hidden { display: none !important; }
        .celebration-text { font-family: 'Dancing Script', cursive; font-size: 2.5rem; line-height: 1.4; }
        
        footer { background-color: #fff; padding: 20px; text-align: center; border-top: 3px solid var(--gold); font-size: 0.9rem; }
        footer a { color: var(--dark-pink); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="main-content" class="container">
        <h1>Feliz Dia da Mulher Angolana!</h1>
        <p>Homenagem à Mulher Angolana: Força, Beleza e Tradição.</p>
        <div style="margin: 30px 0;">
            <input type="text" id="userName" placeholder="Nome da homenageada...">
            <button onclick="iniciarCelebracao()">Felicitar</button>
        </div>
    </div>

    <div id="celebration-screen" class="hidden">
        <div class="celebration-text" id="final-message"></div>
        <div style="font-size: 4rem; margin: 20px;">✨ 🌹 ✨</div>
        <button onclick="location.reload()">Enviar outra homenagem</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <footer>
        Desenvolvido por <strong>Teotonio Baltazar</strong><br>
        <a href="mailto:tbaltaza@student42luanda.com">tbaltaza@student42luanda.com</a>
    </footer>

    <script>
        const frases = [
            "Que a sua força continue a inspirar todos ao seu redor.",
            "A sua resiliência é o brilho que ilumina o nosso futuro.",
            "Pela sua dedicação e amor infinito: você merece todas as homenagens hoje.",
            "Mulher angolana, você é a harmonia perfeita entre a tradição e a modernidade."
        ];

        function iniciarCelebracao() {
            const name = document.getElementById('userName').value;
            if (name.trim() === "") { alert("Por favor, insira um nome!"); return; }

            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('celebration-screen').classList.remove('hidden');
            
            const audio = document.getElementById('bg-music');
            audio.play().catch(e => console.log("Autoplay bloqueado pelo navegador"));

            const frase = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById('final-message').innerHTML = `Parabéns, ${name}!<br><br>"${frase}"`;
        }
    </script>
</body>
</html>
