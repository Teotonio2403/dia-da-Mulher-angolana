<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia da Mulher Angolana</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --gold: #d4af37;
            --dark-pink: #c9184a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--soft-pink);
            background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
            position: relative;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--dark-pink);
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .decoration {
            font-size: 2rem;
            color: var(--gold);
            margin: 10px 0;
        }

        .input-section {
            margin: 30px 0;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
        }

        input[type="text"] {
            padding: 12px 20px;
            width: 70%;
            border: 2px solid var(--primary-pink);
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        button {
            padding: 12px 25px;
            background-color: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--dark-pink);
            transform: scale(1.05);
        }

        #message-display {
            margin-top: 30px;
            padding: 20px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .phrase {
            font-size: 1.4rem;
            color: #444;
            font-style: italic;
            line-height: 1.6;
            animation: fadeIn 1s ease-in;
        }

        .highlight-name {
            color: var(--dark-pink);
            font-weight: 600;
            display: block;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        footer {
            background-color: #fff;
            padding: 20px;
            text-align: center;
            border-top: 3px solid var(--gold);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--dark-pink);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            input[type="text"] { width: 100%; margin-bottom: 10px; }
            button { width: 100%; margin-left: 0; }
            .container { margin: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="decoration">✿ ❀ ❁ ✾</div>
        <h1>Feliz 8 de Março!</h1>
        <p>Homenagem à Mulher Angolana: Força, Beleza e Tradição.</p>

        <div class="input-section">
            <input type="text" id="userName" placeholder="Digite o nome da mulher homenageada...">
            <button onclick="celebrar()">Felicitar</button>
        </div>

        <div id="message-display">
            <p class="phrase">"A mulher angolana é o pilar da nossa cultura e o coração da nossa terra."</p>
        </div>
        
        <div class="decoration">✾ ❁ ❀ ✿</div>
    </div>

    <footer>
        Desenvolvido por <strong>Teotonio Baltazar</strong><br>
        <a href="mailto:tbaltaza@student42luanda.com">tbaltaza@student42luanda.com</a>
    </footer>

    <script>
        const frases = [
            "Que a sua força continue a inspirar todos ao seu redor e a construir uma Angola melhor.",
            "A sua resiliência é o brilho que ilumina o nosso futuro. Feliz dia!",
            "Pela sua dedicação, coragem e amor infinito: você merece todas as homenagens hoje.",
            "Mulher angolana, você é a harmonia perfeita entre a tradição e a modernidade.",
            "Que o seu dia seja tão radiante quanto o sol que brilha sobre a nossa terra.",
            "Honramos hoje a sua história e o papel fundamental que desempenha na nossa sociedade."
        ];

        function celebrar() {
            const name = document.getElementById('userName').value;
            const display = document.getElementById('message-display');
            
            if (name.trim() === "") {
                alert("Por favor, insira um nome para a homenagem!");
                return;
            }

            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];

            display.innerHTML = `
                <div class="phrase">
                    <span class="highlight-name">Parabéns, ${name}!</span>
                    ${fraseAleatoria}
                </div>
            `;
        }
    </script>
</body>
</html>
